<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <div class="slide">
                <div class="center gap-small">
                    <img src="" alt=" " class="frame frame-style-1" data-saved-image="1">
                    <img src="" alt=" " class="frame frame-style-2" data-saved-image="2">
                    <img src="" alt=" " class="frame frame-style-3" data-saved-image="3">
                    <img src="" alt=" " class="frame frame-style-4" data-saved-image="4">
                </div>
            </div>
            <div class="slide">
                <div class="center gap-small">
                    <img src="" alt=" " class="frame frame-style-5" data-saved-image="5">
                    <img src="" alt=" " class="frame frame-style-6" data-saved-image="6">
                    <img src="" alt=" " class="frame frame-style-7" data-saved-image="7">
                </div>
            </div>
            <div class="slide">
                <div class="center gap-small">
                    <img src="" alt=" " class="frame frame-style-8" data-saved-image="8">
                    <img src="" alt=" " class="frame frame-style-9" data-saved-image="9">
                </div>
            </div>
        </div>
    </div>

    <div id="menu" class="menu-closed">
        <div class="menu-title">Settings</div>
        <div class="menu-content">
            <H1>Settings 1</H1>
            <H2>Settings 2</H2>
            <H3>Settings 3</H3>
            <H4>Settings 4</H4>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none;" accept="image/*" />
    <script src="script.js"></script>
</body>
</html>
