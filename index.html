<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <div class="slide">
                <button class="frame frame-style-1" data-saved-image="1"></button>
                <div class="center gap-small">
                    <button onclick="clickFrame()"><img src="" alt=" " class="frame frame-style-1" data-saved-image="1"></button>
                    <img src="" alt=" " class="frame frame-style-2" data-saved-image="2">
                    <img src="" alt=" " class="frame frame-style-3" data-saved-image="3">
                    <img src="" alt=" " class="frame frame-style-4" data-saved-image="4">
                </div>
            </div>
            <div class="slide">
                <div class="center gap-small">
                    <img src="" alt=" " class="frame frame-style-5" data-saved-image="5">
                    <img src="" alt=" " class="frame frame-style-6" data-saved-image="6">
                    <img src="" alt=" " class="frame frame-style-7" data-saved-image="7">
                </div>
            </div>
            <div class="slide">
                <div class="center gap-small">
                    <img src="" alt=" " class="frame frame-style-8" data-saved-image="8">
                    <img src="" alt=" " class="frame frame-style-9" data-saved-image="9">
                </div>
            </div>
        </div>
    </div>

    <div id="menu" class="menu-closed">
        <div class="menu-title">Settings</div>
        <div class="menu-content">
            <h4 id="user-agent"></h4>
            <h4 id="device-type"></h4>
            <h4 id="page-status"></h4>
            </div>
        </div>
    </div>

    <p id="debug-page" style="position: fixed; top: 0%; left: 0%; width: 100%; height: 5vh;"></p>

    <input type="file" id="fileInput" style="display:none;" accept="image/*" />
    <script src="scriptn.js"></script>
</body>
</html>
