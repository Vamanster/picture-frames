    (function () {

                info: "#00c3ff",
                warn: "#ffd11a",
                error: "#ff4d4d",
                promise: "#ff66ff"

            const original = console[method];

                const formatted = args.map(a =>
                    typeof a === "object"
                        ? safeStringify(a)
                        : String(a)
                ).join(" ");
                write(method, formatted);
                original.apply(console, args);
            };
        });

        function safeStringify(obj) {
            try {
                return JSON.stringify(obj, null, 2);
            } catch {
                return "[Unserializable Object]";

                );

            );
